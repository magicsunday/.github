# Canonical magicsunday label set — single source of truth.
# Applied to every actively-maintained (non-fork) repository. Repo-specific
# labels beyond this set are preserved; only these are enforced (name, color,
# description). Keep in sync via the reusable label-sync workflow.
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: "security"
  color: "ee0701"
  description: "Security-relevant finding"
- name: "question"
  color: "d876e3"
  description: "Further information is requested"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"
- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "priority: critical"
  color: "b60205"
  description: "Critical priority"
- name: "priority: high"
  color: "d93f0b"
  description: "High priority"
- name: "priority: medium"
  color: "fbca04"
  description: "Medium priority"
- name: "priority: low"
  color: "0e8a16"
  description: "Low priority"
- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update a dependency file"
- name: "github_actions"
  color: "000000"
  description: "Pull requests that update GitHub Actions code"
