name: yamllint (reusable)

# Reusable yamllint check of the calling repository's GitHub Actions
# workflow YAML. Callers invoke it via
# `uses: magicsunday/.github/.github/workflows/yamllint.yml@main` and may
# override `paths` to lint additional YAML. line-length is demoted to a
# warning (GHA `run:` blocks legitimately carry long inline strings) and
# indentation is pinned to 4 spaces (the house standard — yamllint's default
# `consistent` would otherwise accept 2-space files); every other rule keeps
# the yamllint default.
on:
    workflow_call:
        inputs:
            paths:
                description: 'Space-separated YAML paths to lint.'
                required: false
                type: string
                default: '.github/workflows/'

permissions:
    contents: read

jobs:
    yamllint:
        name: yamllint (workflow YAML)
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: '3.12'

            - name: Install yamllint
              run: pip install --quiet yamllint

            # PATHS is consumed from the environment (not inlined into the
            # command) so a caller-supplied value cannot inject shell; the
            # unquoted expansion is intentional — it is a space-separated
            # path list.
            - name: Run yamllint
              env:
                  PATHS: ${{ inputs.paths }}
              run: |
                  # shellcheck disable=SC2086
                  yamllint \
                      -d "{extends: default, rules: {line-length: {max: 200, level: warning}, document-start: disable, truthy: {check-keys: false}, comments: {min-spaces-from-content: 1}, indentation: {spaces: 4, indent-sequences: true}}}" \
                      $PATHS
