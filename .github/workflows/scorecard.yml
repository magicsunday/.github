name: Scorecard (reusable)

# Reusable OSSF Scorecard supply-chain analysis shared across all magicsunday
# repositories. Callers invoke it via
# `uses: magicsunday/.github/.github/workflows/scorecard.yml@main` and must grant
# `security-events: write` and `id-token: write`. Only meaningful on public repos.
on:
    workflow_call:

permissions:
    contents: read

jobs:
    analysis:
        name: Scorecard analysis
        runs-on: ubuntu-latest

        permissions:
            # Upload the results to the code-scanning dashboard.
            security-events: write
            # Publish the results to the public OpenSSF dashboard.
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Run OSSF Scorecard
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: scorecard.sarif
                  results_format: sarif
                  publish_results: true

            - name: Upload SARIF to code scanning
              if: always()
              uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
              with:
                  sarif_file: scorecard.sarif
