name: Zizmor (reusable)

# Reusable zizmor audit of the calling repository's GitHub Actions workflows
# (template-injection, over-broad permissions, unpinned actions, …). Callers
# invoke it via `uses: magicsunday/.github/.github/workflows/zizmor.yml@main`
# and must grant `security-events: write`.
on:
    workflow_call:

permissions:
    contents: read

jobs:
    zizmor:
        name: Zizmor (workflow security)
        runs-on: ubuntu-latest

        permissions:
            contents: read
            security-events: write

        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            # The action runs zizmor over the repository's workflows and uploads
            # the SARIF results to the code-scanning dashboard.
            -   name: Run zizmor
                uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
