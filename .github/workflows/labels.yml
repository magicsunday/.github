name: Labels

# Dogfood the reusable label-sync workflow against this repository so the
# canonical manifest defined here is applied to this repository's own labels.
on:
    push:
        branches: [main]
        paths: [labels.yml]
    schedule:
        - cron: '15 4 * * 1'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    sync:
        uses: ./.github/workflows/label-sync.yml
        permissions:
            contents: read
            issues: write
