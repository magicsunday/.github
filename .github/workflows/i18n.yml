name: i18n (reusable)

# Reusable translation-catalogue check for repositories that ship gettext
# locales. Two concerns, deliberately different severities:
#
#   1. Layout (HARD FAIL): every tracked .po/.mo must live at
#      <lang-dir>/<locale>/messages.{po,mo}. A catalogue committed anywhere
#      else — e.g. a stray top-level messages.po — fails the check, so a
#      contributor's misplaced file blocks the pull request until corrected.
#      The local pre-commit hook only runs for committers who opted in; this
#      check enforces the layout for every PR, including forks.
#
#   2. Fuzzy (ADVISORY, never fails): fuzzy PO entries are surfaced as
#      non-blocking annotations. They compile out to the English fallback,
#      which is acceptable, so they must not gate a merge — requiring a
#      contributor to translate every locale before merging would be hostile.
#      New languages and partial translations therefore pass freely.
#
#   3. Pipeline freshness (HARD FAIL, opt-in via `check-pipeline: true`): runs
#      the module's source-driven `make lang` and fails if it errors or leaves
#      a non-empty diff. This catches a stale catalogue (a source string added
#      or removed without re-running the pipeline) and a broken pipeline (such
#      as a bad msgmerge flag) before either ships green. Repositories whose
#      `make lang` is still compile-only leave `check-pipeline` at its default
#      (false) and the job is skipped.
#
# The generated .pot template is gitignored and never appears in the tree, so
# it needs no special handling. Callers invoke this via
# `uses: magicsunday/.github/.github/workflows/i18n.yml@main` and may override
# `lang-dir` if their catalogues live outside `resources/lang`.
on:
    workflow_call:
        inputs:
            lang-dir:
                description: 'Root directory holding the per-locale catalogues.'
                type: string
                default: 'resources/lang'
            check-pipeline:
                description: 'Run `make lang` and fail on a non-empty diff (source-driven pipeline only).'
                type: boolean
                default: false
            node-image:
                description: 'Container image whose gettext/msgfmt must match the maintainer''s local `make lang`.'
                type: string
                default: 'node:lts-alpine'

permissions:
    contents: read

jobs:
    i18n:
        name: Catalogue layout
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Check catalogue layout and fuzzy entries
                env:
                    LANG_DIR: ${{ inputs.lang-dir }}
                run: |
                    set -euo pipefail

                    lang_dir="${LANG_DIR%/}"
                    allowed_re="^${lang_dir}/[^/]+/messages\.(po|mo)$"

                    # 1. Layout — collect every tracked catalogue not at the
                    # expected <lang_dir>/<locale>/messages.{po,mo} path.
                    misplaced=()
                    while IFS= read -r f; do
                        [ -n "$f" ] || continue
                        [[ "$f" =~ $allowed_re ]] || misplaced+=("$f")
                    done < <(git ls-files '*.po' '*.mo')

                    # 2. Fuzzy — count per PO, emit a non-blocking warning each.
                    fuzzy_total=0
                    fuzzy_lines=()
                    while IFS= read -r po; do
                        [ -n "$po" ] || continue
                        n=$(awk '/^#~/{next} /^#,.*fuzzy/{c++} END{print c+0}' "$po")
                        [ "$n" -gt 0 ] || continue
                        fuzzy_total=$((fuzzy_total + n))
                        fuzzy_lines+=("${po}: ${n}")
                        echo "::warning file=${po}::${n} fuzzy entries compile out to the English fallback (non-blocking; native-speaker update welcome)."
                    done < <(git ls-files "${lang_dir}/*.po")

                    {
                        echo "## i18n catalogue check"
                        echo
                        echo "Expected layout: \`${lang_dir}/<locale>/messages.{po,mo}\`"
                        echo
                        if [ ${#misplaced[@]} -eq 0 ]; then
                            echo "- **Layout:** ✔ all catalogues correctly placed"
                        else
                            echo "- **Layout:** ✘ ${#misplaced[@]} misplaced file(s):"
                            printf '  - `%s`\n' "${misplaced[@]}"
                        fi
                        echo "- **Fuzzy (advisory, non-blocking):** ${fuzzy_total} entries"
                        if [ ${#fuzzy_lines[@]} -gt 0 ]; then
                            printf '  - `%s`\n' "${fuzzy_lines[@]}"
                        fi
                    } >> "$GITHUB_STEP_SUMMARY"

                    if [ ${#misplaced[@]} -gt 0 ]; then
                        for f in "${misplaced[@]}"; do
                            echo "::error file=${f}::Translation catalogue must live at ${lang_dir}/<locale>/messages.{po,mo}."
                        done
                        echo "i18n layout check failed: ${#misplaced[@]} misplaced catalogue file(s)." >&2
                        exit 1
                    fi

                    echo "i18n layout check passed."

    pipeline:
        name: Pipeline freshness
        if: ${{ inputs.check-pipeline }}
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                    persist-credentials: false

            -   name: Run `make lang` and assert the catalogue is up to date
                env:
                    NODE_IMAGE: ${{ inputs.node-image }}
                run: |
                    set -euo pipefail

                    # Drive the whole pipeline inside the same image the
                    # maintainer's `make lang` uses, so xgettext / msgmerge /
                    # msgfmt output is byte-identical to the committed
                    # catalogue (a host gettext of a different version would
                    # reflow PO lines and trip a phantom diff). COMPOSE_RUN is
                    # emptied so each recipe runs in this container instead of
                    # spawning a nested `docker compose` service; the
                    # fuzzy-resolver (python3) runs in the same container, so no
                    # host/container ownership split corrupts the PO files.
                    docker run --rm -v "$PWD":/app -w /app "$NODE_IMAGE" sh -c '
                        apk add --no-cache make bash gettext python3 >/dev/null 2>&1
                        make lang COMPOSE_RUN=
                    '

                    # The container writes the regenerated catalogue as root;
                    # let the runner-owned checkout read it back for the diff.
                    git config --global --add safe.directory "$PWD"

                    if git diff --quiet; then
                        echo "i18n pipeline freshness check passed: \`make lang\` is a no-op." >> "$GITHUB_STEP_SUMMARY"
                        exit 0
                    fi

                    echo "::error::make lang produced changes — the committed catalogue is out of date or the pipeline is broken. Run make lang locally and commit the result."
                    {
                        echo "## i18n pipeline freshness"
                        echo
                        echo "Running \`make lang\` changed tracked files. Either the catalogue is stale (a source string was added or removed without re-running the pipeline) or the pipeline itself drifted."
                        echo
                        echo '### Changed files'
                        echo '```'
                        git diff --stat
                        echo '```'
                    } >> "$GITHUB_STEP_SUMMARY"

                    git --no-pager diff
                    exit 1
