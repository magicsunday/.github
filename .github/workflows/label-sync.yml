name: Label sync (reusable)

# Reusable label synchroniser shared across all magicsunday repositories. It
# fetches the canonical label manifest from magicsunday/.github and applies it
# to the calling repository.
#
# The caller job MUST grant `issues: write` — a reusable workflow's token is
# capped by the caller's ceiling, so without it the label writes fail at
# runtime with a 403. Copy this call verbatim:
#
#     jobs:
#         sync:
#             uses: magicsunday/.github/.github/workflows/label-sync.yml@main
#             permissions:
#                 contents: read
#                 issues: write
#
# skip-delete keeps the sync non-destructive: canonical labels are created and
# updated, but repo-specific labels are left untouched.
on:
    workflow_call:

permissions:
    contents: read

jobs:
    sync:
        name: Sync labels
        runs-on: ubuntu-latest

        permissions:
            contents: read
            issues: write

        steps:
            - name: Fetch the canonical label manifest
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  repository: magicsunday/.github
                  path: .magicsunday-github
                  persist-credentials: false

            - name: Sync labels
              uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
              with:
                  yaml-file: .magicsunday-github/labels.yml
                  skip-delete: true
